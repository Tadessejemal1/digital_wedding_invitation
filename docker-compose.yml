services:
  postgres:
    image: postgres:16-alpine
    container_name: our-weddings-db
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding123
      POSTGRES_DB: weddings
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
